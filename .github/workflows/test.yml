name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: illusory0x0/setup-moonbit@v0.1.0
        with:
          version: stable

      - name: moon version
        run: moon version --all

      - name: Install dependencies
        run: |
          moon update
          moon install

      - name: moon check
        run: moon check

      - name: moon fmt --deny-warn
        run: moon fmt --deny-warn || moon fmt --check

      - name: moon info --deny-warn
        run: moon info --deny-warn || moon info

      - name: moon test
        run: moon test --target wasm-gc
