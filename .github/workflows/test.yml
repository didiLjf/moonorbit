name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: chawyehsu/setup-moonup@v1

      - name: Setup MSVC (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: moon version
        run: moon version --all

      - name: Install dependencies
        run: |
          moon update
          moon install

      - name: moon check
        run: moon check

      - name: moon build
        run: moon build

      - name: moon test
        run: moon test --target all

      - name: moon fmt --check
        run: moon fmt --check
